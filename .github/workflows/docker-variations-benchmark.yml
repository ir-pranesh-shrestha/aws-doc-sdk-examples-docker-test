          END=$(date +%s)
          DURATION=$((END - START))
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────
  # .NET  (all 15 variations)
  # ──────────────────────────────────────────────────────
  dotnet_benchmark:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'dotnet' }}
