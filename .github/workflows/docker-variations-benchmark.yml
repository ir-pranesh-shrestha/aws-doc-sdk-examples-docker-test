name: Docker Variation Tests - Build Time Benchmark (Master)

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ruby
          - python
          - javascript
          - go
          - dotnet
          - java
          - php

# ─────────────────────────────────────────────────────────────────────────────
# Benchmarks all 15 Dockerfile variations per language.
# Each build step is timed with date +%s and the duration is emitted as a
# Markdown table row to $GITHUB_STEP_SUMMARY for easy comparison in the
# GitHub Actions UI.
# A summary job at the end (needs all language jobs, if: always()) reports
# per-language completion status.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────
  # RUBY  (all 15 variations)
  # ──────────────────────────────────────────────────────
  ruby_benchmark:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-multi-stage"
            complexity: "LOW-MEDIUM"
          - variation: "03-dev-hot-reload"
            complexity: "LOW"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "05-arg-env-config"
            complexity: "LOW-MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "07-alpine-minimal"
            complexity: "MEDIUM"
          - variation: "08-pinned-digest"
            complexity: "LOW-MEDIUM"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "10-multi-stage-nonroot-healthcheck"
            complexity: "HIGH"
          - variation: "11-ci-runner-awscli"
            complexity: "MEDIUM-HIGH"
          - variation: "12-buildkit-secret"
            complexity: "HIGH"
          - variation: "13-onbuild-base"
            complexity: "MEDIUM"
          - variation: "14-readonly-filesystem"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Initialize benchmark summary
        run: |
          echo "## Ruby Build Time Benchmark — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|" >> $GITHUB_STEP_SUMMARY
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          START=$(date +%s)
          docker build \
            -t ruby-benchmark-${{ matrix.variation }} \
            -f ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          DURATION=$((END - START))
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────
  # PYTHON  (all 15 variations)
  # ──────────────────────────────────────────────────────
  python_benchmark:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'python' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-slim-base"
            complexity: "LOW"
          - variation: "03-alpine-minimal"
            complexity: "MEDIUM"
          - variation: "04-multi-stage-wheel-builder"
            complexity: "MEDIUM"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-arg-env-config"
            complexity: "LOW-MEDIUM"
          - variation: "07-healthcheck"
            complexity: "MEDIUM"
          - variation: "08-virtualenv"
            complexity: "MEDIUM"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "10-dev-with-tests"
            complexity: "MEDIUM"
          - variation: "11-ci-runner-awscli"
            complexity: "MEDIUM-HIGH"
          - variation: "12-multi-stage-venv-nonroot"
            complexity: "HIGH"
          - variation: "13-labels-entrypoint"
            complexity: "LOW-MEDIUM"
          - variation: "14-readonly-filesystem"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Initialize benchmark summary
        run: |
          echo "## Python Build Time Benchmark — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|" >> $GITHUB_STEP_SUMMARY
      - name: "Python | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          START=$(date +%s)
          docker build \
            -t python-benchmark-${{ matrix.variation }} \
            -f ./docker-test-variations/python/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          DURATION=$((END - START))
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────
  # JAVASCRIPT  (all 15 variations)
  # ──────────────────────────────────────────────────────
