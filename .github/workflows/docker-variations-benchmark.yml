  # ──────────────────────────────────────────────────────
  # SUMMARY — reports after all language jobs complete
  # ──────────────────────────────────────────────────────
  benchmark_summary:
    runs-on: ubuntu-latest
    needs:
      - ruby_benchmark
      - python_benchmark
      - javascript_benchmark
      - go_benchmark
      - dotnet_benchmark
      - java_benchmark
      - php_benchmark
    if: always()
    steps:
      - name: Print benchmark completion summary
        run: |
          echo "## Build Time Benchmark — All Languages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Language   | Variations | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ruby       | 15        | ${{ needs.ruby_benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python     | 15        | ${{ needs.python_benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript | 15        | ${{ needs.javascript_benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go         | 15        | ${{ needs.go_benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| .NET       | 15        | ${{ needs.dotnet_benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java       | 15        | ${{ needs.java_benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHP        | 15        | ${{ needs.php_benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total variations benchmarked: 105" >> $GITHUB_STEP_SUMMARY
