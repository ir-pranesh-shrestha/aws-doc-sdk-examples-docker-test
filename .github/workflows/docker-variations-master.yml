name: Docker Variation Tests - ALL Languages (Master)

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to test (leave empty to run ALL)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ruby
          - python
          - javascript
          - go
          - dotnet
          - java
          - php

jobs:

  ruby_variations:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-multi-stage"
            complexity: "LOW-MEDIUM"
          - variation: "03-dev-hot-reload"
            complexity: "LOW"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "05-arg-env-config"
            complexity: "LOW-MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "07-alpine-minimal"
            complexity: "MEDIUM"
          - variation: "08-pinned-digest"
            complexity: "LOW-MEDIUM"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "10-multi-stage-nonroot-healthcheck"
            complexity: "HIGH"
          - variation: "11-ci-runner-awscli"
            complexity: "MEDIUM-HIGH"
          - variation: "12-buildkit-secret"
            complexity: "HIGH"
          - variation: "13-onbuild-base"
            complexity: "MEDIUM"
          - variation: "14-readonly-filesystem"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https//app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}

      - uses: actions/checkout@v3

      - name: "Ruby | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          docker build \
            -t ruby-variation-${{ matrix.variation }} \
            -f ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }} \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test--secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .

      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"

  python_variations:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'python' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-slim-base"
            complexity: "LOW"
          - variation: "03-alpine-minimal"
            complexity: "MEDIUM"
          - variation: "04-multi-stage-wheel-builder"
            complexity: "MEDIUM"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-arg-env-config"
            complexity: "LOW-MEDIUM"
          - variation: "07-healthcheck"
            complexity: "MEDIUM"
          - variation: "08-virtualenv"
            complexity: "MEDIUM"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "10-dev-with-tests"
            complexity: "MEDIUM"
          - variation: "11-ci-runner-awscli"
            complexity: "MEDIUM-HIGH"
          - variation: "12-multi-stage-venv-nonroot"
            complexity: "HIGH"
          - variation: "13-labels-entrypoint"
            complexity: "LOW-MEDIUM"
          - variation: "14-readonly-filesystem"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https//app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}

      - uses: actions/checkout@v3

      - name: "Python | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          docker build \
            -t python-variation-${{ matrix.variation }} \
            -f ./docker-test-variations/python/Dockerfile.${{ matrix.variation }} \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test--secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .

      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"

  javascript_variations:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'javascript' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-alpine-minimal"
            complexity: "LOW-MEDIUM"
          - variation: "03-dev-hot-reload"
            complexity: "LOW"
          - variation: "04-multi-stage"
            complexity: "MEDIUM"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-arg-env-config"
            complexity: "LOW-MEDIUM"
          - variation: "07-healthcheck"
            complexity: "MEDIUM"
          - variation: "08-layer-cache-optimised"
            complexity: "LOW-MEDIUM"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "10-monorepo-lerna"
            complexity: "HIGH"
          - variation: "11-ci-runner-awscli"
            complexity: "MEDIUM-HIGH"
          - variation: "12-multi-stage-nonroot-healthcheck"
            complexity: "HIGH"
          - variation: "13-typescript-build"
            complexity: "HIGH"
          - variation: "14-readonly-filesystem"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https//app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}

      - uses: actions/checkout@v3

      - name: "JavaScript | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          docker build \
            -t javascript-variation-${{ matrix.variation }} \
            -f ./docker-test-variations/javascript/Dockerfile.${{ matrix.variation }} \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test--secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .

      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"

