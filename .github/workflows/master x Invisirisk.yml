  # ──────────────────────────────────────────────────────
  php_variations:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'php' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-phpfpm-nginx"
            complexity: "MEDIUM"
