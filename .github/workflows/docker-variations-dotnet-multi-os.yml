name: Docker Variation Tests - .NET (Multi-OS Runner Matrix)

on:
  workflow_dispatch:

jobs:
  build_dotnet_multi_os:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-latest]
        variation:
          - "01-simple-single-stage"
          - "02-multi-stage-aspnet"
          - "06-healthcheck"
          - "10-multi-project-build"
          - "15-full-production-grade"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: ".NET | Dockerfile.${{ matrix.variation }} [os=${{ matrix.os }}]"
        run: |
          OS_TAG=$(echo "${{ matrix.os }}" | tr '.' '-')
          docker build \
            -t dotnet-${OS_TAG}-${{ matrix.variation }} \
            -f ./docker-test-variations/dotnet/Dockerfile.${{ matrix.variation }} \
            .
