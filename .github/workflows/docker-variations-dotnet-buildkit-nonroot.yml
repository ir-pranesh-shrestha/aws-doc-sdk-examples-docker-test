name: Docker Variation Tests - .NET (BuildKit + Non-Root)

on:
  workflow_dispatch:

jobs:
  build_dotnet_buildkit_nonroot:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "04-non-root-user"
            feature: "nonroot"
          - variation: "08-buildkit-nuget-cache"
            feature: "buildkit-nuget-cache"
          - variation: "14-nonroot-readonly-fs"
            feature: "nonroot-readonly"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: ".NET | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t dotnet-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/dotnet/Dockerfile.${{ matrix.variation }} \
            .
