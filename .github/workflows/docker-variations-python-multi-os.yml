name: Docker Variation Tests - Python (Multi-OS Runner Matrix)

on:
  workflow_dispatch:

jobs:
  build_python_multi_os:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-latest]
        variation:
          - "01-simple-single-stage"
          - "04-multi-stage-wheel-builder"
          - "07-healthcheck"
          - "12-multi-stage-venv-nonroot"
          - "15-full-production-grade"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: "Python | Dockerfile.${{ matrix.variation }} [os=${{ matrix.os }}]"
        run: |
          OS_TAG=$(echo "${{ matrix.os }}" | tr '.' '-')
          docker build \
            -t python-${OS_TAG}-${{ matrix.variation }} \
            -f ./docker-test-variations/python/Dockerfile.${{ matrix.variation }} \
            .
