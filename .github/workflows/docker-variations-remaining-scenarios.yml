name: Docker Variation Tests - All Remaining Scenarios (Master)

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - buildkit-nonroot
          - buildpush-action
          - buildarg
          - multiplatform
          - trivy-scan
          - smoke-test
          - cache-strategy
          - benchmark
      language:
        description: "Language to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ruby
          - python
          - javascript
          - go
          - dotnet
          - java
          - php

# ═════════════════════════════════════════════════════════════════════════════
# Scenarios covered:
#   buildkit-nonroot  — DOCKER_BUILDKIT=1, non-root + cache-mount variations
#   buildpush-action  — docker/build-push-action@v5 with GHA cache
#   buildarg          — --build-arg injection matrix
#   multiplatform     — linux/amd64 + linux/arm64 via QEMU + Buildx
#   trivy-scan        — build → Trivy CVE scan (non-blocking, CRITICAL/HIGH)
#   smoke-test        — build → docker run verify → cleanup
#   cache-strategy    — cold vs layer-cache vs GHA-cache (3 sequential jobs)
#   benchmark         — all 15 variations timed → $GITHUB_STEP_SUMMARY
# ═════════════════════════════════════════════════════════════════════════════

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# SCENARIO 2 — BuildKit + Non-Root
# ─────────────────────────────────────────────────────────────────────────────

  s2_ruby_buildkit_nonroot:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildkit-nonroot') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "04-non-root-user"
            feature: "nonroot"
          - variation: "09-layer-cache-optimised"
            feature: "buildkit-layer-cache"
          - variation: "10-multi-stage-nonroot-healthcheck"
            feature: "combined"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - uses: actions/checkout@v4
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t ruby-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }} .

  s2_python_buildkit_nonroot:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildkit-nonroot') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'python')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "05-non-root-user"
            feature: "nonroot"
          - variation: "09-buildkit-cache-mount"
            feature: "buildkit-cache"
          - variation: "12-multi-stage-venv-nonroot"
            feature: "combined"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - uses: actions/checkout@v4
      - name: "Python | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t python-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/python/Dockerfile.${{ matrix.variation }} .

  s2_javascript_buildkit_nonroot:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildkit-nonroot') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'javascript')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "05-non-root-user"
            feature: "nonroot"
          - variation: "09-buildkit-cache-mount"
            feature: "buildkit-cache"
          - variation: "12-multi-stage-nonroot-healthcheck"
            feature: "combined"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - uses: actions/checkout@v4
      - name: "JavaScript | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t javascript-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/javascript/Dockerfile.${{ matrix.variation }} .

  s2_go_buildkit_nonroot:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildkit-nonroot') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'go')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "05-non-root-user"
            feature: "nonroot"
          - variation: "08-buildkit-cache-mount"
            feature: "buildkit-cache"
          - variation: "14-nonroot-readonly-fs"
            feature: "nonroot-readonly"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - uses: actions/checkout@v4
      - name: "Go | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t go-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/go/Dockerfile.${{ matrix.variation }} .

  s2_dotnet_buildkit_nonroot:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildkit-nonroot') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'dotnet')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "04-non-root-user"
            feature: "nonroot"
          - variation: "08-buildkit-nuget-cache"
            feature: "buildkit-nuget-cache"
          - variation: "14-nonroot-readonly-fs"
            feature: "nonroot-readonly"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - uses: actions/checkout@v4
      - name: ".NET | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t dotnet-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/dotnet/Dockerfile.${{ matrix.variation }} .

  s2_java_buildkit_nonroot:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildkit-nonroot') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'java')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "04-non-root-user"
            feature: "nonroot"
          - variation: "07-buildkit-m2-cache"
            feature: "buildkit-m2-cache"
          - variation: "14-jvm-tuned-nonroot"
            feature: "jvm-tuned-nonroot"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - uses: actions/checkout@v4
      - name: "Java | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t java-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/java/Dockerfile.${{ matrix.variation }} .

  s2_php_buildkit_nonroot:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildkit-nonroot') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'php')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "05-non-root-user"
            feature: "nonroot"
          - variation: "08-buildkit-composer-cache"
            feature: "buildkit-composer-cache"
          - variation: "14-readonly-filesystem"
            feature: "readonly"
          - variation: "15-full-production-grade"
            feature: "production"
    steps:
      - uses: actions/checkout@v4
      - name: "PHP | Dockerfile.${{ matrix.variation }} [feature=${{ matrix.feature }}]"
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t php-buildkit-${{ matrix.variation }} \
            -f ./docker-test-variations/php/Dockerfile.${{ matrix.variation }} .

# ─────────────────────────────────────────────────────────────────────────────
# SCENARIO 3 — docker/build-push-action (GHA cache, push: false)
# ─────────────────────────────────────────────────────────────────────────────

  s3_ruby_buildpush_action:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildpush-action') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage"
            complexity: "LOW-MEDIUM"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: ruby-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s3_python_buildpush_action:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildpush-action') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'python')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-slim-base"
            complexity: "LOW"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "07-healthcheck"
            complexity: "MEDIUM"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: "Python | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/python/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: python-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s3_javascript_buildpush_action:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildpush-action') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'javascript')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-alpine-minimal"
            complexity: "LOW-MEDIUM"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "07-healthcheck"
            complexity: "MEDIUM"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: "JavaScript | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/javascript/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: javascript-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s3_go_buildpush_action:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildpush-action') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'go')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage-alpine"
            complexity: "MEDIUM"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "07-healthcheck"
            complexity: "MEDIUM"
          - variation: "08-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: "Go | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/go/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: go-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s3_dotnet_buildpush_action:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildpush-action') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'dotnet')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage-aspnet"
            complexity: "MEDIUM"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "08-buildkit-nuget-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: ".NET | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/dotnet/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: dotnet-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s3_java_buildpush_action:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildpush-action') &&
      (github.event.inputs.language == 'all' || github.event.inputs.language == 'java')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage-jre"
            complexity: "MEDIUM"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "07-buildkit-m2-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: "Java | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/java/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: java-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  s3_php_buildpush_action:
    if: >-
      (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'buildpush-action') &&
