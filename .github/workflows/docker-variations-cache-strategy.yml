name: Docker Variation Tests - Cache Strategy Comparison (Master)

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ruby
          - python
          - javascript
          - go
          - dotnet
          - java
          - php

# ─────────────────────────────────────────────────────────────────────────────
# Three separate sequential jobs per language to compare cache strategies:
#   cold  — docker build --no-cache (baseline, no layer reuse)
#   layer — plain docker build (reuses daemon layer cache from prior cold run)
#   gha   — docker/build-push-action@v5 with type=gha cache (cross-run cache)
# Build duration for each variation is written to $GITHUB_STEP_SUMMARY.
# Dockerfile subset per language: simple (01), BuildKit-cache, production (15).
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ════════════════════════════════
  # RUBY
  # ════════════════════════════════
  ruby_cold:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: "Ruby (cold) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          echo "## Ruby Cold Build — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Strategy | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s)
          docker build --no-cache \
            -t ruby-cold-${{ matrix.variation }} \
            -f ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | cold | $((END-START))s |" >> $GITHUB_STEP_SUMMARY

  ruby_layer:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ubuntu-latest
    needs: ruby_cold
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: "Ruby (layer-cache) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          echo "## Ruby Layer-Cache Build — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Strategy | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s)
          docker build \
            -t ruby-layer-${{ matrix.variation }} \
            -f ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | layer | $((END-START))s |" >> $GITHUB_STEP_SUMMARY

  ruby_gha:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "Ruby (gha-cache) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: ruby-gha-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

