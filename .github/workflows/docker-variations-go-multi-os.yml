name: Docker Variation Tests - Go (Multi-OS Runner Matrix)

on:
  workflow_dispatch:

jobs:
  build_go_multi_os:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-latest]
        variation:
          - "01-simple-single-stage"
          - "02-multi-stage-alpine"
          - "07-healthcheck"
          - "09-dev-with-tests"
          - "15-full-production-grade"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: "Go | Dockerfile.${{ matrix.variation }} [os=${{ matrix.os }}]"
        run: |
          OS_TAG=$(echo "${{ matrix.os }}" | tr '.' '-')
          docker build \
            -t go-${OS_TAG}-${{ matrix.variation }} \
            -f ./docker-test-variations/go/Dockerfile.${{ matrix.variation }} \
            .
