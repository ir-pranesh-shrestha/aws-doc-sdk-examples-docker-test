name: Docker Variation Tests - PHP (Cache Strategy Comparison)

on:
  workflow_dispatch:

jobs:
  php_cold:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "08-buildkit-composer-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: "PHP (cold) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          echo "## PHP Cold Build — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Strategy | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s)
          docker build --no-cache \
            -t php-cold-${{ matrix.variation }} \
            -f ./docker-test-variations/php/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | cold | $((END-START))s |" >> $GITHUB_STEP_SUMMARY

  php_layer:
    runs-on: ubuntu-latest
    needs: php_cold
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "08-buildkit-composer-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: "PHP (layer-cache) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          echo "## PHP Layer-Cache Build — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Strategy | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s)
          docker build \
            -t php-layer-${{ matrix.variation }} \
            -f ./docker-test-variations/php/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | layer | $((END-START))s |" >> $GITHUB_STEP_SUMMARY

  php_gha:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "08-buildkit-composer-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "PHP (gha-cache) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/php/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: php-gha-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
