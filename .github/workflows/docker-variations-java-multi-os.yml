name: Docker Variation Tests - Java (Multi-OS Runner Matrix)

on:
  workflow_dispatch:

jobs:
  build_java_multi_os:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-latest]
        variation:
          - "01-simple-maven"
          - "02-multi-stage-jre"
          - "06-healthcheck"
          - "12-layered-jar"
          - "15-full-production-grade"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: "Java | Dockerfile.${{ matrix.variation }} [os=${{ matrix.os }}]"
        run: |
          OS_TAG=$(echo "${{ matrix.os }}" | tr '.' '-')
          docker build \
            -t java-${OS_TAG}-${{ matrix.variation }} \
            -f ./docker-test-variations/java/Dockerfile.${{ matrix.variation }} \
            .
