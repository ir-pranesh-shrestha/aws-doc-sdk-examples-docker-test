name: Docker Variation Tests - .NET (Build Time Benchmark)

on:
  workflow_dispatch:

jobs:
  build_dotnet_benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-multi-stage-aspnet"
            complexity: "MEDIUM"
          - variation: "03-nuget-cache-optimised"
            complexity: "MEDIUM"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "05-arg-env-config"
            complexity: "LOW-MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "07-self-contained-singlefile"
            complexity: "HIGH"
          - variation: "08-buildkit-nuget-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "09-dev-watch"
            complexity: "MEDIUM"
          - variation: "10-multi-project-build"
            complexity: "HIGH"
          - variation: "11-ci-runner-awscli"
            complexity: "MEDIUM-HIGH"
          - variation: "12-test-gate-stage"
            complexity: "HIGH"
          - variation: "13-aot-native"
            complexity: "HIGH"
          - variation: "14-nonroot-readonly-fs"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Initialize benchmark summary
        run: |
          echo "## .NET Build Time Benchmark — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|" >> $GITHUB_STEP_SUMMARY
      - name: ".NET | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          START=$(date +%s)
          docker build \
            -t dotnet-benchmark-${{ matrix.variation }} \
            -f ./docker-test-variations/dotnet/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          DURATION=$((END - START))
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
