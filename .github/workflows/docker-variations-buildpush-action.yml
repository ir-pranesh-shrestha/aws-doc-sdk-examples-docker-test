          tags: go-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # .NET
  # ──────────────────────────────────────────────────────
  dotnet_buildpush_action:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'dotnet' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage-aspnet"
            complexity: "MEDIUM"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "08-buildkit-nuget-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: ".NET | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/dotnet/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: dotnet-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # JAVA
  # ──────────────────────────────────────────────────────
  java_buildpush_action:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'java' }}
