  # ──────────────────────────────────────────────────────
  php_buildpush_action:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'php' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-phpfpm-nginx"
