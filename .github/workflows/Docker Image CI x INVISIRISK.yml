name: Docker Image CI x INVISIRISK
on:
  workflow_dispatch:

jobs:
  build_images:
    runs-on: ubuntu-latest

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          app_token: ${{secrets.IR_API_KEY}}
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============
      - name: Check out the repo
        uses: actions/checkout@v3

      #################################
      ######   Docker Image: Ruby #####
      #################################
      - name: Build Docker image - Ruby
        run: |
          docker build -t ruby -f ./ruby/Dockerfile --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 ./ruby

      #################################
      ######   Docker Image: Python ###
      #################################
      - name: Build Docker image - Python
        run: |
          docker build -t python -f ./python/Dockerfile --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 ./python

      #################################
      ######   Docker Image: JS v3 ####
      #################################
      - name: Build Docker image - JavaScript
        run: |
          docker build -t javascriptv3 -f ./javascriptv3/Dockerfile --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 ./javascriptv3

      #################################
      ######   Docker Image: Go v2 ####
      #################################
      - name: Build Docker image - GoLang
        run: |
          docker build -t gov2 -f ./gov2/Dockerfile --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 ./gov2


      #################################
      ######   Docker Image: .NET #####
      #################################
      - name: Build Docker image - .NET v3
        run: |
          docker build -t dotnetv3 -f ./dotnetv3/Dockerfile --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 ./dotnetv3

      #################################
      ######   Docker Image: Java #####
      #################################
      - name: Build Docker image - Java v2
        run: |
          docker build -t javav2 -f ./javav2/Dockerfile --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 ./javav2


      #################################
      ######   Docker Image: PHP ######
      #################################
      - name: Build Docker image - PHP
        run: |
          docker build -t php -f ./php/Dockerfile --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 ./php
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
