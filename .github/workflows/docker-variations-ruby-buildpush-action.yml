name: Docker Variation Tests - Ruby (Build-Push Action)

on:
  workflow_dispatch:

jobs:
  build_ruby_buildpush_action:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage"
            complexity: "LOW-MEDIUM"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: ruby-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
