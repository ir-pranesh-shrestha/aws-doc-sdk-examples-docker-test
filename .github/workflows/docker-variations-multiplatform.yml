      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "PHP | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/php/Dockerfile.${{ matrix.variation }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: php-multiplatform-${{ matrix.variation }}:latest
