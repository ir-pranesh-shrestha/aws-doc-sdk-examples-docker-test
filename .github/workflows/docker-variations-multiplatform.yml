name: Docker Variation Tests - Multi-Platform linux/amd64 + linux/arm64 (Master)

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ruby
          - python
          - javascript
          - go
          - dotnet
          - java
          - php

# ─────────────────────────────────────────────────────────────────────────────
# Builds for linux/amd64 AND linux/arm64 simultaneously using QEMU emulation
# and Docker Buildx.  push: false means images are built but not pushed to any
# registry — suitable for CI validation of multi-arch compatibility.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────
  # RUBY
  # ──────────────────────────────────────────────────────
  ruby_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage"
            complexity: "LOW-MEDIUM"
          - variation: "07-alpine-minimal"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ruby-multiplatform-${{ matrix.variation }}:latest

  # ──────────────────────────────────────────────────────
  # PYTHON
  # ──────────────────────────────────────────────────────
  python_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'python' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-slim-base"
            complexity: "LOW"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "Python | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/python/Dockerfile.${{ matrix.variation }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: python-multiplatform-${{ matrix.variation }}:latest

  # ──────────────────────────────────────────────────────
  # JAVASCRIPT
  # ──────────────────────────────────────────────────────
  javascript_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'javascript' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-alpine-minimal"
            complexity: "LOW-MEDIUM"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "JavaScript | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/javascript/Dockerfile.${{ matrix.variation }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: javascript-multiplatform-${{ matrix.variation }}:latest

  # ──────────────────────────────────────────────────────
  # GO
  # ──────────────────────────────────────────────────────
  go_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'go' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage-alpine"
            complexity: "MEDIUM"
          - variation: "04-distroless"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "Go | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/go/Dockerfile.${{ matrix.variation }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: go-multiplatform-${{ matrix.variation }}:latest

  # ──────────────────────────────────────────────────────
  # .NET
  # ──────────────────────────────────────────────────────
  dotnet_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'dotnet' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage-aspnet"
            complexity: "MEDIUM"
          - variation: "07-self-contained-singlefile"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: ".NET | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/dotnet/Dockerfile.${{ matrix.variation }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: dotnet-multiplatform-${{ matrix.variation }}:latest

  # ──────────────────────────────────────────────────────
  # JAVA
  # ──────────────────────────────────────────────────────
  java_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'java' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage-jre"
            complexity: "MEDIUM"
          - variation: "08-jlink-custom-jre"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "Java | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
