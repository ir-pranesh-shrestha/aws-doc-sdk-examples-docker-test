name: Docker Variation Tests - Python (Cache Strategy Comparison)

on:
  workflow_dispatch:

jobs:
  python_cold:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: "Python (cold) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          echo "## Python Cold Build — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Strategy | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s)
          docker build --no-cache \
            -t python-cold-${{ matrix.variation }} \
            -f ./docker-test-variations/python/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | cold | $((END-START))s |" >> $GITHUB_STEP_SUMMARY

  python_layer:
    runs-on: ubuntu-latest
    needs: python_cold
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: "Python (layer-cache) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          echo "## Python Layer-Cache Build — ${{ matrix.variation }}" >> $GITHUB_STEP_SUMMARY
          echo "| Variation | Complexity | Strategy | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s)
          docker build \
            -t python-layer-${{ matrix.variation }} \
            -f ./docker-test-variations/python/Dockerfile.${{ matrix.variation }} \
            .
          END=$(date +%s)
          echo "| ${{ matrix.variation }} | ${{ matrix.complexity }} | layer | $((END-START))s |" >> $GITHUB_STEP_SUMMARY

  python_gha:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "09-buildkit-cache-mount"
            complexity: "MEDIUM-HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: "Python (gha-cache) | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/python/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: python-gha-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
