name: Docker Variation Tests - Multi-OS Runner Matrix (Master)

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ruby
          - python
          - javascript
          - go
          - dotnet
          - java
          - php

# ─────────────────────────────────────────────────────────────────────────────
# Each language job runs 5 Dockerfile variations across 3 Ubuntu runner versions
# (cross-product of os × variation).  fail-fast: false so one failure does not
# cancel the rest of the matrix.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────
  # RUBY  (5 variations × 3 OS = 15 combinations)
  # ──────────────────────────────────────────────────────
  ruby_multi_os:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-latest]
        variation:
          - "01-simple-single-stage"
          - "02-multi-stage"
          - "06-healthcheck"
          - "10-multi-stage-nonroot-healthcheck"
          - "15-full-production-grade"
    steps:
      - uses: actions/checkout@v4
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [os=${{ matrix.os }}]"
        run: |
          OS_TAG=$(echo "${{ matrix.os }}" | tr '.' '-')
          docker build \
            -t ruby-${OS_TAG}-${{ matrix.variation }} \
            -f ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }} \
            .

  # ──────────────────────────────────────────────────────
  # PYTHON  (5 variations × 3 OS = 15 combinations)
  # ──────────────────────────────────────────────────────
  python_multi_os:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'python' }}
